<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}حسابداری{% endblock %}</title>
  
 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css">
  
  <style>
    body { 
      font-family: 'Vazir', Tahoma, sans-serif; 
      margin: 0; 
      padding: 0; 
      direction: rtl;
      text-align: right;
    }
    nav { 
      background-color: #eee; 
      padding: 10px;
    }
    
    nav a { 
      margin-left: 20px; 
      text-decoration: none; 
      color: #333; 
      font-weight: bold; 
    }
    nav a:hover { 
      color: #007BFF; 
    }
    .container { 
      margin: 20px; 
    }
    table { 
      border-collapse: collapse; 
      width: 100%; 
    }
    th, td { 
      border: 1px solid #ccc; 
      padding: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('home') }}">لیست مشتریان</a>
    <a href="{{ url_for('orders_active') }}">سفارشات فعال</a>
    <a href="{{ url_for('orders_inactive') }}">سفارشات نافعال</a>
  </nav>
  <div class="container">
    {% block content %}
    {% endblock %}
  </div>
</body>
</html>
