{% extends "base.html" %}

{% block title %}اضافه کردن مشتری{% endblock %}

{% block content %}
<style>
  form.customer-form {
    direction: rtl;
    text-align: right;
    max-width: 600px;
    margin: auto;
  }
  form.customer-form div {
    margin-bottom: 1em;
  }
  form.customer-form label {
    display: block;
    font-weight: bold;
    margin-bottom: 0.5em;
  }
  form.customer-form input[type="text"],
  form.customer-form input[type="number"],
  form.customer-form input[type="date"],
  form.customer-form textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  form.customer-form input[type="checkbox"] {
    margin-left: 5px;
  }
  form.customer-form button {
    padding: 8px 16px;
    background-color: #5cb85c;
    border: none;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  form.customer-form button:hover {
    background-color: #4cae4c;
  }
</style>

<h1>اضافه کردن مشتری جدید</h1>
<form class="customer-form" action="{{ url_for('add_customer') }}" method="post">
  <div>
    <label for="name">نام و نام خانوادگی:</label>
    <input type="text" id="name" name="name" required>
  </div>
  <div>
    <label for="customer_code">کد مشتری:</label>
    <input type="text" id="customer_code" name="customer_code" required>
  </div>
  <div>
    <label for="phone">تلفن:</label>
    <input type="text" id="phone" name="phone" required>
  </div>
  <div>
    <label for="address">آدرس:</label>
    <input type="text" id="address" name="address">
  </div>
  <div>
    <label for="description">توضیحات:</label>
    <textarea id="description" name="description"></textarea>
  </div>
  <button type="submit">اضافه کن</button>
</form>
{% endblock %}
