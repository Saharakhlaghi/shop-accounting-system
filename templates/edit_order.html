{% extends "base.html" %}

{% block title %}ویرایش سفارش{% endblock %}

{% block content %}
<style>
  form {
    direction: rtl;
    text-align: right;
    max-width: 600px;
    margin: auto;
  }
  form div {
    margin-bottom: 1em;
  }
  form label {
    display: block;
    font-weight: bold;
    margin-bottom: 0.5em;
  }
  form input[type="text"],
  form input[type="number"],
  form input[type="date"],
  form textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  form input[type="checkbox"] {
    margin-left: 5px;
  }
  form button {
    padding: 8px 16px;
    background-color: #5cb85c;
    border: none;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  form button:hover {
    background-color: #4cae4c;
  }
</style>

<h1>ویرایش سفارش</h1>
<form action="{{ url_for('edit_order', order_id=order['id']) }}" method="post">
  
  <div>
    <label>نام مشتری:</label>
    <div style="padding: 8px; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px;">
      {{ customer_name }}
    </div>
    <input type="hidden" name="customer_id" value="{{ order['customer_id'] }}">
  </div>
  
  
  <div>
    <label for="product">محصول:</label>
    <input type="text" id="product" name="product" value="{{ order['product'] }}" required>
  </div>
  <div>
    <label for="purchase_amount">مبلغ خرید:</label>
    <input type="number" step="0.01" id="purchase_amount" name="purchase_amount" value="{{ order['purchase_amount'] }}" required>
  </div>
  <div>
    <label for="selling_amount">مبلغ فروش:</label>
    <input type="number" step="0.01" id="selling_amount" name="selling_amount" value="{{ order['selling_amount'] }}" required>
  </div>
  <div>
    <label for="deposit">واریزی:</label>
    <input type="number" step="0.01" id="deposit" name="deposit" value="{{ order['deposit'] }}">
  </div>
  <div>
    <label for="registration_date">تاریخ ثبت :</label>
    <input type="text" id="registration_date" name="registration_date" value="{{ order['registration_date'] }}" required>
  </div>
  <div>
    <label for="delivery_date">تاریخ تحویل :</label>
    <input type="text" id="delivery_date" name="delivery_date" value="{{ order['delivery_date'] }}">
  </div>
  <div>
    <label for="send_to_customer_address">ارسال به آدرس مشتری؟</label>
    <input type="checkbox" id="send_to_customer_address" name="send_to_customer_address">
  </div>
  <div>
    <label for="delivery_address">آدرس تحویل:</label>
    <input type="text" id="delivery_address" name="delivery_address" value="{{ order['delivery_address'] }}">
  </div>
  <div>
    <label for="delivered">تحویل داده شده؟</label>
    <input type="checkbox" id="delivered" name="delivered" {% if order['delivered'] == 1 %}checked{% endif %}>
  </div>
  <button type="submit">ذخیره تغییرات</button>
</form>
{% endblock %}
